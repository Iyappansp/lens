<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffeedd" />
      <stop offset="100%" stop-color="#e0a96d" />
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="400" height="360" rx="16" fill="url(#bg)" />
  
  <g transform="translate(0, 10)">
    <!-- Face Outline: Broad Forehead, Pointed / Narrow Chin -->
    <path d="M 125,120 C 115,80 285,80 275,120 C 275,160 250,210 200,270 C 150,210 125,160 125,120 Z" fill="url(#skin)" opacity="0.9" />
    
    <!-- Neck -->
    <path d="M 190,265 L 190,315 L 210,315 L 210,265 Z" fill="#c68a4c" opacity="0.8"/>
    
    <!-- Hair -->
    <path d="M 115,120 Q 200,25 285,120 Q 200,75 115,120 Z" fill="#5c3a21" />

    <!-- Eyes -->
    <ellipse cx="168" cy="168" rx="7" ry="4" fill="#5c3a21" />
    <ellipse cx="232" cy="168" rx="7" ry="4" fill="#5c3a21" />

    <!-- Recommended: Light Rimless / Bottom-Heavy Frames -->
    <g transform="translate(0, 10)">
      <!-- Temples -->
      <path d="M 120,150 L 135,148 M 280,150 L 265,148" stroke="#4a5568" stroke-width="2.5" />
      <!-- Left Lens (Rimless appearance) -->
      <rect x="135" y="132" width="46" height="36" rx="10" fill="url(#lens)" stroke="#e2e8f0" stroke-width="2" />
      <!-- Right Lens -->
      <rect x="219" y="132" width="46" height="36" rx="10" fill="url(#lens)" stroke="#e2e8f0" stroke-width="2" />
      <!-- Bridge -->
      <path d="M 181,146 Q 200,138 219,146" fill="none" stroke="#4a5568" stroke-width="3" />
      <!-- Glare -->
      <path d="M 140,138 L 155,160 M 225,138 L 240,160" stroke="#fff" stroke-width="1.5" opacity="0.5" />
    </g>
    
    <!-- Smile -->
    <path d="M 188,222 Q 200,230 212,222" fill="none" stroke="#7c2d12" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>