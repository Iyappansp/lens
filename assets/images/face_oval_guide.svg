<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffedd5" />
      <stop offset="100%" stop-color="#fdbb2d" />
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF953F" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
  </defs>
  <rect width="400" height="360" rx="16" fill="url(#bg)" />
  
  <g transform="translate(0, 10)">
    <!-- Face Outline: Oval Shape -->
    <ellipse cx="200" cy="180" rx="80" ry="105" fill="url(#skin)" opacity="0.9" />
    
    <!-- Neck -->
    <path d="M 185,275 L 185,315 L 215,315 L 215,275 Z" fill="#e28743" opacity="0.8"/>
    
    <!-- Hair -->
    <path d="M 115,140 Q 200,50 285,140 Q 200,90 115,140 Z" fill="#311432" />
    <path d="M 115,140 C 115,140 100,220 120,240 C 130,210 130,160 130,160 Z" fill="#311432" />
    <path d="M 285,140 C 285,140 300,220 280,240 C 270,210 270,160 270,160 Z" fill="#311432" />

    <!-- Eyes -->
    <ellipse cx="170" cy="172" rx="9" ry="5" fill="#111827" opacity="0.2" />
    <ellipse cx="230" cy="172" rx="9" ry="5" fill="#111827" opacity="0.2" />
    <circle cx="170" cy="172" r="3.5" fill="#311432" />
    <circle cx="230" cy="172" r="3.5" fill="#311432" />

    <!-- Recommended: Elegant Cat-Eye Frame -->
    <g transform="translate(0, 10)">
      <!-- Temples -->
      <path d="M 105,152 Q 120,150 130,152" stroke="url(#gold)" stroke-width="4.5" />
      <path d="M 295,152 Q 280,150 270,152" stroke="url(#gold)" stroke-width="4.5" />
      <!-- Left Lens/Rim -->
      <path d="M 120,140 C 140,132 180,138 180,162 C 180,182 140,185 130,165 C 122,150 117,143 120,140 Z" fill="url(#lens)" stroke="url(#gold)" stroke-width="5" stroke-linejoin="round" />
      <!-- Right Lens/Rim -->
      <path d="M 280,140 C 260,132 220,138 220,162 C 220,182 260,185 270,165 C 278,150 283,143 280,140 Z" fill="url(#lens)" stroke="url(#gold)" stroke-width="5" stroke-linejoin="round" />
      <!-- Bridge -->
      <path d="M 180,154 Q 200,147 220,154" fill="none" stroke="url(#gold)" stroke-width="5" />
      <!-- Glare -->
      <path d="M 130,146 C 145,142 165,155 165,165" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.5" stroke-linecap="round" />
    </g>
    
    <!-- Smile -->
    <path d="M 188,235 Q 200,245 212,235" fill="none" stroke="#7c2d12" stroke-width="4.5" stroke-linecap="round" />
  </g>
</svg>