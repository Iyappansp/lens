<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E0E0" />
      <stop offset="100%" stop-color="#B0BEC5" />
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CFD8DC" />
      <stop offset="50%" stop-color="#546E7A" />
      <stop offset="100%" stop-color="#90A4AE" />
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="40%" stop-color="#e0f7fa" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#80deea" stop-opacity="0.1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#455a64" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="14" fill="url(#bg)" />
  <g filter="url(#shadow)" transform="translate(0, 10)">
    <!-- Thin metal temples -->
    <path d="M 85,148 L 55,120 M 315,148 L 345,120" stroke="url(#metal)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Hexagonal Rimless Lenses -->
    <polygon points="90,135 130,122 175,135 175,165 130,178 90,165" fill="url(#lens)" stroke="#ffffff" stroke-width="1.5" opacity="0.8" />
    <polygon points="225,135 270,122 310,135 310,165 270,178 225,165" fill="url(#lens)" stroke="#ffffff" stroke-width="1.5" opacity="0.8" />
    
    <!-- Metal bridge and lens mounting brackets -->
    <path d="M 175,148 Q 200,138 225,148" fill="none" stroke="url(#metal)" stroke-width="4.5" stroke-linecap="round"/>
    
    <!-- Mini mounting pins -->
    <circle cx="95" cy="148" r="2" fill="url(#metal)" />
    <circle cx="170" cy="148" r="2" fill="url(#metal)" />
    <circle cx="230" cy="148" r="2" fill="url(#metal)" />
    <circle cx="305" cy="148" r="2" fill="url(#metal)" />
    
    <!-- Sleek Glare -->
    <path d="M 100,132 L 140,170 M 235,132 L 275,170" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4" />
  </g>
</svg>