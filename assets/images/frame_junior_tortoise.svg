<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0" />
      <stop offset="100%" stop-color="#FFE0B2" />
    </linearGradient>
    <pattern id="tortoise-kids" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="#E65100" />
      <circle cx="8" cy="8" r="6" fill="#4E342E" />
      <circle cx="22" cy="20" r="8" fill="#3E2723" />
    </pattern>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffe0b2" stop-opacity="0.1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#8d6e63" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="14" fill="url(#bg)" />
  <g filter="url(#shadow)" transform="translate(0, 10)">
    <!-- Temples -->
    <path d="M 95,150 L 70,120 M 305,150 L 330,120" stroke="url(#tortoise-kids)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Square kid rims -->
    <rect x="100" y="125" width="75" height="55" rx="14" fill="url(#lens)" stroke="url(#tortoise-kids)" stroke-width="10" />
    <rect x="225" y="125" width="75" height="55" rx="14" fill="url(#lens)" stroke="url(#tortoise-kids)" stroke-width="10" />
    
    <path d="M 175,142 Q 200,135 225,142" fill="none" stroke="url(#tortoise-kids)" stroke-width="10" stroke-linecap="round" />
    
    <!-- Reflection -->
    <path d="M 112,135 L 140,165 M 238,135 L 266,165" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5" />
  </g>
</svg>