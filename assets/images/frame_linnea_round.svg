<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5" />
      <stop offset="100%" stop-color="#E8EAF6" />
    </linearGradient>
    <linearGradient id="rose-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B388FF" />
      <stop offset="50%" stop-color="#FF8A80" />
      <stop offset="100%" stop-color="#FFD180" />
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffccd5" stop-opacity="0.15" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#a390b5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="14" fill="url(#bg)" />
  <g filter="url(#shadow)" transform="translate(0, 10)">
    <!-- Temples -->
    <path d="M 90,150 Q 60,130 50,110 M 310,150 Q 340,130 350,110" fill="none" stroke="url(#rose-gold)" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Lenses and Rims -->
    <circle cx="140" cy="150" r="40" fill="url(#lens)" stroke="url(#rose-gold)" stroke-width="5" />
    <circle cx="260" cy="150" r="40" fill="url(#lens)" stroke="url(#rose-gold)" stroke-width="5" />
    
    <!-- Bridge -->
    <path d="M 180,142 Q 200,130 220,142" fill="none" stroke="url(#rose-gold)" stroke-width="5" stroke-linecap="round" />
    
    <!-- Reflection -->
    <path d="M 115,130 Q 145,160 165,135" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    <path d="M 235,130 Q 265,160 285,135" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5" />
  </g>
</svg>