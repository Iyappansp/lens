<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9" />
      <stop offset="100%" stop-color="#C8E6C9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#2e7d32" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="14" fill="url(#bg)" />
  <g filter="url(#shadow)" transform="translate(0, 10)">
    <!-- Temples -->
    <path d="M 90,150 L 65,120 M 310,150 L 335,120" stroke="#4CAF50" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Rims -->
    <circle cx="140" cy="150" r="38" fill="#ffffff" fill-opacity="0.2" stroke="#4CAF50" stroke-width="10" />
    <circle cx="260" cy="150" r="38" fill="#ffffff" fill-opacity="0.2" stroke="#4CAF50" stroke-width="10" />
    
    <!-- Bridge -->
    <path d="M 178,146 Q 200,135 222,146" fill="none" stroke="#4CAF50" stroke-width="10" stroke-linecap="round" />
    
    <!-- Reflections -->
    <path d="M 120,130 Q 140,165 155,145" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.6" />
    <path d="M 240,130 Q 260,165 275,145" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.6" />
  </g>
</svg>