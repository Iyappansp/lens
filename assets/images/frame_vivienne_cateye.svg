<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECEFF1" />
      <stop offset="100%" stop-color="#CFD8DC" />
    </linearGradient>
    <linearGradient id="pink-crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF80AB" />
      <stop offset="100%" stop-color="#FF2F92" />
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#f8bbd0" stop-opacity="0.1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#8c9ba5" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="14" fill="url(#bg)" />
  <g filter="url(#shadow)" transform="translate(0, 10)">
    <!-- Temples -->
    <path d="M 75,140 L 50,110 M 325,140 L 350,110" stroke="url(#pink-crystal)" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Cat Eye Paths -->
    <!-- Left Rim -->
    <path d="M 80,120 C 110,110 170,120 170,155 C 170,185 110,190 95,160 C 85,140 75,125 80,120 Z" fill="url(#lens)" stroke="url(#pink-crystal)" stroke-width="10" stroke-linejoin="round" />
    <!-- Right Rim -->
    <path d="M 320,120 C 290,110 230,120 230,155 C 230,185 290,190 305,160 C 315,140 325,125 320,120 Z" fill="url(#lens)" stroke="url(#pink-crystal)" stroke-width="10" stroke-linejoin="round" />
    
    <path d="M 165,138 Q 200,128 235,138" fill="none" stroke="url(#pink-crystal)" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Glamour reflection lines -->
    <path d="M 90,125 C 110,120 150,135 155,150" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    <path d="M 310,125 C 290,120 250,135 245,150" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5" />
  </g>
</svg>