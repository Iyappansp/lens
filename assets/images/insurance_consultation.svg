<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="shield-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="22" fill="url(#bg)" />
  
  <!-- Stylized Shield representing Protection/Insurance -->
  <path d="M 300,70 C 370,70 420,90 420,160 C 420,240 330,300 300,320 C 270,300 180,240 180,160 C 180,90 230,70 300,70 Z" fill="none" stroke="url(#shield-glow)" stroke-width="6" opacity="0.8" />
  <path d="M 300,85 C 355,85 395,100 395,155 C 395,215 325,270 300,290 C 275,270 205,215 205,155 C 205,100 245,85 300,85 Z" fill="url(#shield-glow)" opacity="0.15" />

  <!-- Spectacles overlaid in front of the shield -->
  <g transform="translate(175, 115)">
    <rect x="20" y="30" width="90" height="50" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-width="8" />
    <rect x="140" y="30" width="90" height="50" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-width="8" />
    <path d="M 110,50 Q 130,42 150,50" fill="none" stroke="#ffffff" stroke-width="8" />
    <path d="M 30,42 L 75,80 M 150,42 L 195,80" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  </g>
  
  <!-- Checkmark at the bottom of the shield -->
  <circle cx="300" cy="285" r="28" fill="#22c55e" />
  <path d="M 288,285 L 296,293 L 314,275" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

  <text x="300" y="360" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff">DIRECT VISION DIRECT BILLING</text>
</svg>