<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <radialGradient id="screen-glow" cx="10%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#00d2ff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  <rect width="500" height="400" rx="16" fill="url(#bg)" />
  
  <!-- Glowing laptop screen representation on the left edge -->
  <rect x="0" y="0" width="60" height="400" fill="#00d2ff" opacity="0.2" />
  <rect x="0" y="0" width="200" height="400" fill="url(#screen-glow)" />

  <g transform="translate(180, 70)">
    <!-- Spectacles showing blue light shielding -->
    <!-- Left temple -->
    <path d="M 20,150 Q -30,110 -60,80" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" />
    <!-- Right temple -->
    <path d="M 220,150 Q 270,110 300,80" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" />

    <!-- Rims -->
    <rect x="15" y="110" width="85" height="60" rx="16" fill="url(#lens)" stroke="#334155" stroke-width="10" />
    <rect x="140" y="110" width="85" height="60" rx="16" fill="url(#lens)" stroke="#334155" stroke-width="10" />
    
    <!-- Bridge -->
    <path d="M 100,135 Q 120,126 140,135" fill="none" stroke="#334155" stroke-width="10" stroke-linecap="round" />
    
    <!-- Blue reflection glow on lens -->
    <path d="M 25,120 L 70,165 M 150,120 L 195,165" stroke="#00f0ff" stroke-width="6" stroke-linecap="round" opacity="0.7" />
    
    <!-- Shield indicator graphic -->
    <circle cx="120" cy="50" r="28" fill="none" stroke="#00f0ff" stroke-width="2" stroke-dasharray="4,3" />
    <path d="M 112,50 L 118,56 L 128,44" fill="none" stroke="#00f0ff" stroke-width="4" stroke-linecap="round" />
  </g>
  
  <text x="250" y="340" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00d2ff">DIGITAL BLUE SHIELD</text>
  <text x="250" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">Prevents Eye Fatigue · Digital Comfort</text>
</svg>