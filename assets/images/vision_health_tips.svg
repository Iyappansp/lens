<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9" />
      <stop offset="100%" stop-color="#C8E6C9" />
    </linearGradient>
  </defs>
  <rect width="500" height="400" rx="16" fill="url(#bg)" />
  
  <!-- Desk surface -->
  <rect x="0" y="280" width="500" height="120" fill="#a1887f" />
  <rect x="0" y="280" width="500" height="8" fill="#8d6e63" />
  
  <!-- Laptop in background -->
  <rect x="60" y="120" width="140" height="100" rx="6" fill="#cfd8dc" stroke="#90a4ae" stroke-width="4" />
  <rect x="70" y="130" width="120" height="80" fill="#eceff1" />
  <path d="M 100,160 Q 130,130 160,170" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <!-- Laptop Keyboard base -->
  <polygon points="50,220 210,220 230,260 30,260" fill="#b0bec5" />
  <rect x="70" y="250" width="90" height="5" fill="#78909c" />

  <!-- A glass of clean water -->
  <path d="M 280,180 L 290,260 C 290,265 310,265 310,260 L 320,180 Z" fill="#e0f7fa" opacity="0.8" stroke="#b2ebf2" stroke-width="2" />
  <path d="M 285,210 L 292,256 C 292,258 308,258 308,256 L 315,210 Z" fill="#80deea" opacity="0.6" />
  <ellipse cx="300" cy="180" rx="20" ry="5" fill="none" stroke="#b2ebf2" stroke-width="2" />

  <!-- Healthy Salad Bowl -->
  <ellipse cx="390" cy="245" rx="55" ry="25" fill="#8d6e63" />
  <!-- Salad Content -->
  <ellipse cx="390" cy="235" rx="50" ry="20" fill="#4caf50" />
  <circle cx="370" cy="230" r="10" fill="#2e7d32" />
  <circle cx="410" cy="232" r="12" fill="#81c784" />
  <circle cx="390" cy="236" r="8" fill="#e57373" /> <!-- Tomato -->
  <circle cx="355" cy="235" r="7" fill="#ffb74d" /> <!-- Orange block -->
  
  <!-- Floating wellness rings -->
  <circle cx="250" cy="100" r="45" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="6,4" opacity="0.6" />
  <path d="M 235,100 L 245,110 L 265,90" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" />
  
  <!-- Text Note -->
  <text x="250" y="340" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1b5e20">HEALTHY HABITS</text>
  <text x="250" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#2e7d32">20-20-20 Rule · Hydration · Nutrition</text>
</svg>