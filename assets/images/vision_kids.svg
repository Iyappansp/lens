<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4" />
      <stop offset="100%" stop-color="#FFF59D" />
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#2196f3" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  <rect width="500" height="400" rx="16" fill="url(#bg)" />
  
  <!-- Friendly Eye Exam Chart on Left -->
  <rect x="50" y="60" width="100" height="150" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="2" />
  <text x="100" y="95" font-family="monospace" font-size="28" font-weight="bold" fill="#212121" text-anchor="middle">E</text>
  <text x="100" y="125" font-family="monospace" font-size="18" font-weight="bold" fill="#424242" text-anchor="middle">F P</text>
  <text x="100" y="150" font-family="monospace" font-size="13" font-weight="bold" fill="#616161" text-anchor="middle">T O Z</text>
  <text x="100" y="170" font-family="monospace" font-size="10" font-weight="bold" fill="#9e9e9e" text-anchor="middle">L P E D</text>
  <rect x="65" y="185" width="70" height="4" fill="#4caf50" />

  <!-- Child Profile/Silhouette wearing cute glasses on the Right -->
  <g transform="translate(260, 60)">
    <!-- Face outline -->
    <path d="M 50,70 C 130,50 170,120 150,180 C 130,220 70,220 50,180 Z" fill="#ffcc80" />
    <!-- Round cute glasses -->
    <circle cx="95" cy="135" r="28" fill="url(#lens)" stroke="#e91e63" stroke-width="7" />
    <circle cx="155" cy="135" r="28" fill="url(#lens)" stroke="#e91e63" stroke-width="7" />
    <path d="M 123,135 L 127,135" stroke="#e91e63" stroke-width="7" />
    
    <!-- Smile -->
    <path d="M 100,180 Q 115,195 130,180" fill="none" stroke="#d84315" stroke-width="3" stroke-linecap="round" />
    
    <!-- Hair with cute bangs -->
    <path d="M 40,80 Q 100,10 160,80 Q 110,60 40,80 Z" fill="#5d4037" />
  </g>

  <!-- Large test optical lens in foreground -->
  <circle cx="210" cy="180" r="45" fill="none" stroke="#2196f3" stroke-width="12" />
  <line x1="210" y1="225" x2="210" y2="280" stroke="#2196f3" stroke-width="12" stroke-linecap="round" />
  
  <text x="250" y="340" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e91e63">CHILDREN'S VISION</text>
  <text x="250" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#795548">Annual School Checkups · Flexible Frames</text>
</svg>