<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="500" height="400" rx="16" fill="url(#bg)" />
  
  <!-- Compare Grid Lines -->
  <line x1="250" y1="50" x2="250" y2="270" stroke="#334155" stroke-dasharray="6,4" stroke-width="2" />

  <!-- Frame Option A (Left side) -->
  <g transform="translate(45, 110)">
    <rect x="10" y="10" width="60" height="40" rx="8" fill="none" stroke="#4a90e2" stroke-width="6" />
    <rect x="100" y="10" width="60" height="40" rx="8" fill="none" stroke="#4a90e2" stroke-width="6" />
    <path d="M 70,25 Q 85,20 100,25" fill="none" stroke="#4a90e2" stroke-width="6" />
    <text x="85" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#4a90e2">STYLE A: RECTANGLE</text>
  </g>

  <!-- Frame Option B (Right side) -->
  <g transform="translate(285, 110)">
    <circle cx="40" cy="30" r="22" fill="none" stroke="#ff8a80" stroke-width="6" />
    <circle cx="130" cy="30" r="22" fill="none" stroke="#ff8a80" stroke-width="6" />
    <path d="M 62,30 Q 85,20 108,30" fill="none" stroke="#ff8a80" stroke-width="6" />
    <text x="85" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ff8a80">STYLE B: ROUND</text>
  </g>
  
  <!-- Versus Circle indicator in middle -->
  <circle cx="250" cy="150" r="24" fill="#1e3a5f" stroke="#00f0ff" stroke-width="2.5" />
  <text x="250" y="156" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00f0ff">VS</text>

  <text x="250" y="340" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#d6ecf3">COMPARE STYLES</text>
  <text x="250" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7c8798">Side-by-side View · Find What Suits You</text>
</svg>