<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
  </defs>
  <rect width="500" height="400" rx="16" fill="url(#bg)" />
  
  <!-- Face mapping dots/lines -->
  <g transform="translate(150, 70)">
    <!-- Face wireframe silhouette -->
    <path d="M 50,70 Q 100,20 150,70 T 150,170 Q 100,220 50,170 Z" fill="none" stroke="#334155" stroke-dasharray="3,3" stroke-width="2" />
    <circle cx="100" cy="120" r="65" fill="none" stroke="#334155" stroke-width="1.5" />
    
    <!-- Scanning crosshairs -->
    <path d="M 30,120 L 170,120" stroke="#00f0ff" stroke-width="1" opacity="0.3" />
    <path d="M 100,50 L 100,190" stroke="#00f0ff" stroke-width="1" opacity="0.3" />
    
    <!-- Facial mapping anchor points -->
    <circle cx="60" cy="110" r="4" fill="#00f0ff" />
    <circle cx="140" cy="110" r="4" fill="#00f0ff" />
    <circle cx="100" cy="165" r="4" fill="#00f0ff" />
    <circle cx="70" cy="150" r="3" fill="#4a90e2" />
    <circle cx="130" cy="150" r="3" fill="#4a90e2" />
    
    <!-- Virtual Glasses projected -->
    <circle cx="70" cy="115" r="22" fill="none" stroke="url(#glow)" stroke-width="4.5" />
    <circle cx="130" cy="115" r="22" fill="none" stroke="url(#glow)" stroke-width="4.5" />
    <path d="M 92,115 L 108,115" stroke="url(#glow)" stroke-width="4.5" />
  </g>

  <!-- Scan line anim/static -->
  <rect x="80" y="180" width="340" height="2" fill="#00f0ff" opacity="0.8" />
  <rect x="80" y="174" width="340" height="8" fill="url(#glow)" opacity="0.15" />
  
  <text x="250" y="340" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#d6ecf3">INSTANT PREVIEW</text>
  <text x="250" y="365" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7c8798">No Waiting · Browser Camera Engine</text>
</svg>