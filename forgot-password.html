<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Optique & Co.</title>
<meta name="description" content="Reset your Optique & Co. account password.">
<meta name="robots" content="noindex">
<link rel="canonical" href="forgot-password.html">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/dark-mode.css">
<link rel="stylesheet" href="assets/css/rtl.css">
<link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-visual">
    <img src="https://picsum.photos/seed/authvisual3/900/1200" alt="Optical store reception desk">
    <div class="auth-visual-content">
      <h3>We've Got You Covered</h3>
      <p>Resetting your password takes less than a minute — you'll be back to browsing frames in no time.</p>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-top-controls">
      <button class="icon-toggle" id="themeToggleBtn" aria-label="Toggle dark mode" title="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-moon"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <button class="icon-toggle lang-toggle" id="rtlToggleBtn" aria-label="Toggle language direction" title="Toggle RTL/LTR">
        <span id="rtlToggleLabel">EN</span>
      </button>
    </div>

    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html" class="brand">
          <span class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="15" r="4"/><circle cx="18" cy="15" r="4"/><path d="M10 15h4M2 13l2-7a2 2 0 012-1h0M22 13l-2-7a2 2 0 00-2-1h0"/></svg></span>
          <span>Optique &amp; Co.</span>
        </a>
      </div>
      <h2>Reset Your Password</h2>
      <p class="auth-sub">Enter your email and we'll send you a reset link</p>

      <form data-demo-form data-success-message="Reset link sent! Check your inbox.">
        <div class="form-group">
          <label class="form-label" for="resetEmail">Email Address</label>
          <input type="email" id="resetEmail" class="form-control" placeholder="you@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block">Send Reset Link</button>
      </form>

      <p class="auth-footer-text">Remember your password? <a href="login.html">Back to login</a></p>
    </div>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script src="assets/js/products.js"></script>
</body>
</html>
